pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx,mjs,cjs,vue}'
      run: pnpm oxlint {staged_files}
    format:
      glob: '*.{ts,tsx,js,jsx,mjs,cjs,json,vue}'
      run: pnpm oxfmt {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
